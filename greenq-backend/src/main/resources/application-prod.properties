spring.application.name=greenq-backend
server.port=${PORT:8080}

# Railway production profile. Set these values in Railway Variables.
spring.datasource.url=${DB_URL:jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}

# Keep the current SQL-managed schema policy by default.
# For a temporary deployment smoke test only, JPA_DDL_AUTO=update can be used carefully.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.show-sql=false
spring.jackson.time-zone=Asia/Seoul

spring.sql.init.mode=never

# Example: https://greenq.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
