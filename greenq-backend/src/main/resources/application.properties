spring.application.name=greenq-backend
server.port=8081

# MariaDB connection
# DB_PORT 기본값은 3307입니다. MariaDB가 기본 포트라면 실행 환경변수 DB_PORT=3306으로 바꾸거나 아래 URL을 직접 수정하세요.
spring.datasource.url=jdbc:mariadb://localhost:${DB_PORT:3307}/greenq?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
spring.datasource.username=testuser
spring.datasource.password=KaKAS2kO
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# 기존 SQL로 만든 실제 DB를 그대로 사용합니다.
# 최초 실행 전 src/main/resources/db/greenq_schema_v1_0_3.sql, greenq_dummy_data_v1_0_3.sql을 MariaDB에 먼저 실행하세요.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.show-sql=true

# SQL 파일이 앱 실행 때마다 자동으로 실행되면 더미 데이터가 초기화될 수 있어 비활성화합니다.
spring.sql.init.mode=never

# React Vite dev server
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://192.168.0.123:5173,http://172.20.10.2:5173,http://192.168.0.70:5173