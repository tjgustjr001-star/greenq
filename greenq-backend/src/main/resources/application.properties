spring.application.name=greenq-backend
spring.config.import=optional:file:./application-local.properties,optional:file:./greenq-backend/application-local.properties
server.port=${SERVER_PORT:8081}

# Local development defaults. Keep real credentials outside source control.
spring.datasource.url=${DB_URL:jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:greenq}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:testuser}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}

# The schema and demo data are managed through SQL files in src/main/resources/db.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Do not auto-run SQL on startup. Run schema/demo SQL intentionally.
spring.sql.init.mode=never

# Local CORS defaults. Production should set CORS_ALLOWED_ORIGINS explicitly.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://192.168.*.*:5173,http://172.*.*.*:5173,http://10.*.*.*:5173}
